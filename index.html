<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wszystkiego Najlepszego 🎂</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      #mainTitle {
        font-size: 32px;
        font-family: 'Pixelify Sans', sans-serif;
        margin-bottom: 8px;
      }

      #subTitle {
        font-size: 18px;
        font-family: 'Pixelify Sans', sans-serif;
        color: #555;
      }

      #confettiCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 999;
        background: transparent !important;
      }
    </style>
  </head>
  <body>
    <canvas id="confettiCanvas"></canvas>
    <div class="container">
      <div id="birthdayText"></div>
      <div class="cake-container">
        <div class="cake" id="cake"></div>
      </div>
    </div>

    <script>
      // Read URL params
      const params = new URLSearchParams(window.location.search);
      let candleCount = parseInt(params.get("candles")) || 4;
      candleCount = Math.min(Math.max(candleCount, 1), 30);

      const birthdayText = document.getElementById("birthdayText");
      birthdayText.innerHTML = `
        <div id="mainTitle">WSZYSTKIEGO NAJLEPSZEGO KUBUŚ!!!!</div>
        <div id="subTitle">Zrób życzenie i zdmuchnij świeczki.</div>
      `;

      const cake = document.getElementById("cake");

      const colors = [
        "green-candle",
        "purple-candle",
        "blue-candle",
        "yellow-candle",
      ];
      const CAKE_VISUAL_WIDTH = 35;

      function createCandles(count) {
        cake.innerHTML = "";
        const CANDLE_VISUAL_WIDTH = 2;
        const availableWidth = CAKE_VISUAL_WIDTH;
        const candlesPerRow = 6;
        const rowCount = Math.ceil(count / candlesPerRow);
        const shiftAmount = 4;

        for (let i = 0; i < count; i++) {
          const candle = document.createElement("div");
          candle.classList.add("candle");
          const colorClass = colors[Math.floor(Math.random() * colors.length)];
          candle.classList.add(colorClass);

          const row = Math.floor(i / candlesPerRow);
          const col = i % candlesPerRow;
          const totalCandlesInRow = Math.min(
            candlesPerRow,
            count - row * candlesPerRow
          );
          const rowSpacing = availableWidth / (totalCandlesInRow + 1);

          const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
          const rowShift = row % 2 === 0 ? 0 : shiftAmount;

          candle.style.position = "absolute";
          candle.style.top = `${10 + row * 3}px`;
          candle.style.left = `${leftBase - rowShift + 4}px`;

          cake.appendChild(candle);
        }
      }

      createCandles(candleCount);

      // === Microphone / Blow Detection ===
      async function startMicDetection() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: true,
          });
          const audioContext = new (window.AudioContext ||
            window.webkitAudioContext)();
          const source = audioContext.createMediaStreamSource(stream);
          const analyser = audioContext.createAnalyser();
          analyser.fftSize = 512;

          source.connect(analyser);

          const dataArray = new Uint8Array(analyser.frequencyBinCount);

          let blown = false;
          let blowFrameCount = 0;
          const REQUIRED_BLOW_FRAMES = 8;

          function detectBlow() {
            analyser.getByteFrequencyData(dataArray);

            let highFreqSum = 0;
            let lowFreqSum = 0;

            const midpoint = dataArray.length / 2;

            for (let i = 0; i < dataArray.length; i++) {
              if (i < midpoint) {
                lowFreqSum += dataArray[i];
              } else {
                highFreqSum += dataArray[i];
              }
            }

            const highAvg = highFreqSum / (dataArray.length / 2);
            const lowAvg = lowFreqSum / (dataArray.length / 2);

            const ratio = highAvg / (lowAvg + 1);

            const BLOW_RATIO_THRESHOLD = 0.7;
            const MIN_VOLUME = 25;

            if (
              ratio > BLOW_RATIO_THRESHOLD &&
              highAvg > MIN_VOLUME &&
              !blown
            ) {
              blowFrameCount++;
            } else {
              blowFrameCount = 0;
            }

            if (blowFrameCount >= REQUIRED_BLOW_FRAMES && !blown) {
              blown = true;
              blowOutCandles();
            }

            requestAnimationFrame(detectBlow);
          }

          detectBlow();
        } catch (err) {
          console.error("Mic access error:", err);
        }
      }

      function blowOutCandles() {
        const candles = document.querySelectorAll(".candle");
        candles.forEach((candle) => {
          const delay = Math.random() * 1000;
          setTimeout(() => {
            colors.forEach((color) => {
              if (candle.classList.contains(color)) {
                candle.classList.add("blown");
              }
            });
          }, delay);
        });

        // Update subTitle after short delay
        setTimeout(() => {
          const subTitle = document.getElementById("subTitle");
          subTitle.textContent = `JUHUU!!! STO LAT SŁONECZKO 🎉`;
          startConfetti();
        }, 1200);
      }

      // === Confetti ===
      const confettiCanvas = document.getElementById("confettiCanvas");
      const confettiCtx = confettiCanvas.getContext("2d");
      let confettiPieces = [];
      let confettiAnimationId = null;

      function resizeConfettiCanvas() {
        confettiCanvas.width = window.innerWidth;
        confettiCanvas.height = window.innerHeight;
      }
      resizeConfettiCanvas();
      window.addEventListener("resize", resizeConfettiCanvas);

      const confettiColors = [
        "#ff595e",
        "#ffca3a",
        "#8ac926",
        "#1982c4",
        "#6a4c93",
        "#ff924c",
      ];

      function createConfettiPiece() {
        return {
          x: Math.random() * confettiCanvas.width,
          y: -20 - Math.random() * confettiCanvas.height * 0.5,
          size: 6 + Math.random() * 6,
          color:
            confettiColors[Math.floor(Math.random() * confettiColors.length)],
          speedY: 2 + Math.random() * 3,
          speedX: -1.5 + Math.random() * 3,
          rotation: Math.random() * 360,
          rotationSpeed: -6 + Math.random() * 12,
          shape: Math.random() > 0.5 ? "rect" : "circle",
        };
      }

      function startConfetti() {
        // Create an initial burst, then keep topping up for a few seconds
        confettiPieces = [];
        for (let i = 0; i < 150; i++) {
          confettiPieces.push(createConfettiPiece());
        }

        const spawnInterval = setInterval(() => {
          for (let i = 0; i < 8; i++) {
            confettiPieces.push(createConfettiPiece());
          }
        }, 200);

        setTimeout(() => clearInterval(spawnInterval), 3000);

        if (!confettiAnimationId) {
          animateConfetti();
        }
      }

      function animateConfetti() {
        confettiCtx.clearRect(
          0,
          0,
          confettiCanvas.width,
          confettiCanvas.height
        );

        confettiPieces.forEach((p) => {
          p.y += p.speedY;
          p.x += p.speedX;
          p.rotation += p.rotationSpeed;

          confettiCtx.save();
          confettiCtx.translate(p.x, p.y);
          confettiCtx.rotate((p.rotation * Math.PI) / 180);
          confettiCtx.fillStyle = p.color;

          if (p.shape === "rect") {
            confettiCtx.fillRect(
              -p.size / 2,
              -p.size / 4,
              p.size,
              p.size / 2
            );
          } else {
            confettiCtx.beginPath();
            confettiCtx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
            confettiCtx.fill();
          }

          confettiCtx.restore();
        });

        // Remove pieces that fell off screen
        confettiPieces = confettiPieces.filter(
          (p) => p.y < confettiCanvas.height + 30
        );

        if (confettiPieces.length > 0) {
          confettiAnimationId = requestAnimationFrame(animateConfetti);
        } else {
          confettiAnimationId = null;
        }
      }

      startMicDetection();
    </script>
  </body>
</html>
