<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WSZYSTKIEGO NAJLEPSZEGOO🎂</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <style>
      #mainTitle {
        font-size: 32px;
        font-family: 'Pixelify Sans', sans-serif;
        margin-bottom: 8px;
      }

      #subTitle {
        font-size: 18px;
        font-family: 'Pixelify Sans', sans-serif;
        color: #555;
      }
      #confettiCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  pointer-events: none;
  z-index: 9998;
}

.start-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  transition: opacity 0.4s ease;
}

.start-overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

.start-btn {
  font-family: 'Pixelify Sans', sans-serif;
  font-size: 22px;
  padding: 18px 32px;
  border-radius: 14px;
  border: none;
  background: #ffb6c1;
  color: #333;
  cursor: pointer;
  box-shadow: 0 4px 0 #d98ba0;
}

#muteBtn {
  position: fixed;
  top: 16px;
  right: 16px;
  font-size: 22px;
  background: #fff;
  border: 2px solid #333;
  border-radius: 50%;
  width: 44px;
  height: 44px;
  cursor: pointer;
  z-index: 9999;
  display: none;
}

#micStatus {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Pixelify Sans', sans-serif;
  font-size: 13px;
  color: #777;
  z-index: 9999;
}
    </style>
  </head>
  <body>
    <canvas id="confettiCanvas"></canvas>
<button id="muteBtn" title="Wycisz muzyke">🔊</button>
<audio id="bgMusic" src="sto-lat.mp3" loop preload="auto"></audio>
<div id="micStatus"></div>

<div class="start-overlay" id="startOverlay">
  <button class="start-btn" id="startBtn">Kliknij aby zaczac! 🎂</button>
</div>
    <div class="container">
      <div id="birthdayText"></div>
      <div class="cake-container">
        <div class="cake" id="cake"></div>
      </div>
    </div>

    <script>
      // Read URL params
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "KUBUS!!!";
      let candleCount = parseInt(params.get("candles")) || 4;
      candleCount = Math.min(Math.max(candleCount, 1), 30);

      const birthdayText = document.getElementById("birthdayText");
      birthdayText.innerHTML = `
        <div id="mainTitle">WSZYSTKIEGO NAJLEPSZEGOO, ${name}!</div>
        <div id="subTitle">prosze zlozyc zyczenie i dmuchamy swieczki.</div>
      `;

      const cake = document.getElementById("cake");

      const colors = [
        "green-candle",
        "purple-candle",
        "blue-candle",
        "yellow-candle",
      ];
      const CAKE_VISUAL_WIDTH = 35;

      function createCandles(count) {
        cake.innerHTML = "";
        const CANDLE_VISUAL_WIDTH = 2;
        const availableWidth = CAKE_VISUAL_WIDTH;
        const candlesPerRow = 6;
        const rowCount = Math.ceil(count / candlesPerRow);
        const shiftAmount = 4;

        for (let i = 0; i < count; i++) {
          const candle = document.createElement("div");
          candle.classList.add("candle");
          const colorClass = colors[Math.floor(Math.random() * colors.length)];
          candle.classList.add(colorClass);

          const row = Math.floor(i / candlesPerRow);
          const col = i % candlesPerRow;
          const totalCandlesInRow = Math.min(
            candlesPerRow,
            count - row * candlesPerRow
          );
          const rowSpacing = availableWidth / (totalCandlesInRow + 1);

          const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
          const rowShift = row % 2 === 0 ? 0 : shiftAmount;

          candle.style.position = "absolute";
          candle.style.top = `${10 + row * 3}px`;
          candle.style.left = `${leftBase - rowShift + 4}px`;

          cake.appendChild(candle);
        }
      }

      createCandles(candleCount);

      // === Microphone / Blow Detection ===
      const micStatus = document.getElementById("micStatus");

async function startMicDetection() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        autoGainControl: false,
      },
    });
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();
    analyser.fftSize = 1024;
    analyser.smoothingTimeConstant = 0.2;
    source.connect(analyser);

    const timeData = new Uint8Array(analyser.fftSize);

    let blown = false;
    let calibrating = true;
    let ambientRMS = 0;
    let calibrationSamples = [];
    const CALIBRATION_MS = 900;
    const recentRMS = [];
    const ROLLING_WINDOW = 5;
    let sustainedFrames = 0;
    const SUSTAIN_NEEDED = 3;

    if (micStatus) micStatus.textContent = "kalibruje mikrofon, chwila ciszy...";

    setTimeout(() => {
      calibrating = false;
      ambientRMS = calibrationSamples.reduce((a, b) => a + b, 0) / Math.max(calibrationSamples.length, 1);
      if (micStatus) micStatus.textContent = "gotowe - mozesz dmuchac w swieczki!";
    }, CALIBRATION_MS);

    function getRMS(data) {
      let sumSquares = 0;
      for (let i = 0; i < data.length; i++) {
        const normalized = (data[i] - 128) / 128;
        sumSquares += normalized * normalized;
      }
      return Math.sqrt(sumSquares / data.length);
    }

    function detectBlow() {
      analyser.getByteTimeDomainData(timeData);
      const rms = getRMS(timeData);

      if (calibrating) {
        calibrationSamples.push(rms);
        requestAnimationFrame(detectBlow);
        return;
      }

      recentRMS.push(rms);
      if (recentRMS.length > ROLLING_WINDOW) recentRMS.shift();
      const rollingAvg = recentRMS.reduce((a, b) => a + b, 0) / recentRMS.length;

      const volumeThreshold = Math.max(ambientRMS * 1.6, 0.045);

      if (!blown && rollingAvg > volumeThreshold) {
        sustainedFrames++;
      } else {
        sustainedFrames = 0;
      }

      if (!blown && sustainedFrames >= SUSTAIN_NEEDED) {
        blown = true;
        if (micStatus) micStatus.textContent = "";
        blowOutCandles();
      }

      requestAnimationFrame(detectBlow);
    }

    detectBlow();
  } catch (err) {
    console.error("Mic access error:", err);
    if (micStatus) micStatus.textContent = "brak dostepu do mikrofonu - sprawdz uprawnienia przegladarki";
  }
}

      function blowOutCandles() {
        const candles = document.querySelectorAll(".candle");
        candles.forEach((candle) => {
          const delay = Math.random() * 1000;
          setTimeout(() => {
            colors.forEach((color) => {
              if (candle.classList.contains(color)) {
                candle.classList.add("blown");
              }
            });
          }, delay);
        });

        // Update subTitle after short delay
        setTimeout(() => {
          const subTitle = document.getElementById("subTitle");
          subTitle.textContent = `JUPIIIIIIII CZAS SWIETOWAC!!! 🎉`;
          launchConfetti();
        }, 1200);
      }

      // === Confetti ===
const confettiCanvas = document.getElementById("confettiCanvas");
const confettiCtx = confettiCanvas.getContext("2d");

function resizeConfettiCanvas() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
resizeConfettiCanvas();
window.addEventListener("resize", resizeConfettiCanvas);

function launchConfetti() {
  const confettiColors = ["#ff595e", "#ffca3a", "#8ac926", "#1982c4", "#6a4c93", "#ff924c", "#ff70a6"];
  const particles = [];
  const count = 160;

  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * confettiCanvas.width,
      y: -20 - Math.random() * confettiCanvas.height * 0.6,
      size: 4 + Math.random() * 6,
      color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
      speedY: 2 + Math.random() * 3,
      speedX: -1.5 + Math.random() * 3,
      rotation: Math.random() * 360,
      rotationSpeed: -8 + Math.random() * 16,
      sway: Math.random() * Math.PI * 2,
    });
  }

  let frame = 0;
  const maxFrames = 420;

  function animate() {
    frame++;
    confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    particles.forEach((p) => {
      p.y += p.speedY;
      p.sway += 0.05;
      p.x += p.speedX + Math.sin(p.sway) * 1.2;
      p.rotation += p.rotationSpeed;

      confettiCtx.save();
      confettiCtx.translate(p.x, p.y);
      confettiCtx.rotate((p.rotation * Math.PI) / 180);
      confettiCtx.fillStyle = p.color;
      confettiCtx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size * 0.55);
      confettiCtx.restore();
    });

    if (frame < maxFrames) {
      requestAnimationFrame(animate);
    } else {
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
    }
  }
  animate();
}

// === Muzyka ===
const bgMusic = document.getElementById("bgMusic");
let musicMuted = false;

function startBackgroundMusic() {
  bgMusic.volume = 0.5;
  bgMusic.play().catch((err) => console.error("Music playback error:", err));
  const muteBtn = document.getElementById("muteBtn");
  if (muteBtn) muteBtn.style.display = "block";
}

function toggleMute() {
  musicMuted = !musicMuted;
  bgMusic.muted = musicMuted;
  const muteBtn = document.getElementById("muteBtn");
  if (muteBtn) muteBtn.textContent = musicMuted ? "🔇" : "🔊";
}

document.getElementById("muteBtn").addEventListener("click", toggleMute);

document.getElementById("startBtn").addEventListener("click", () => {
  const overlay = document.getElementById("startOverlay");
  overlay.classList.add("hidden");
  setTimeout(() => overlay.remove(), 500);

  startMicDetection();
  startBackgroundMusic();
});
    </script>
  </body>
</html>
